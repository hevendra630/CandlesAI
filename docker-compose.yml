version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: stockai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
      POSTGRES_DB: stockdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stockdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stockai_net

  redis:
    image: redis:7-alpine
    container_name: stockai_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - stockai_net

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: stockai_ai
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - stockai_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockai_backend
    restart: unless-stopped
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - stockai_net 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stockai_net

volumes:
  postgres_data:
  ai_models:

networks:
  stockai_net:
    driver: bridge